# ==================================================
# 91_COP
# ==================================================
# Sensores calculados de potencia y COP.
#
# Cambio importante:
# - En calefacción: potencia = caudal × (ida - retorno)
# - En refrigeración: potencia = caudal × (retorno - ida)
#
# Así el COP instantáneo funciona tanto en calor como en frío.

sensor:
  - platform: template
    name: "Delta T agua"
    id: "${devicename}_delta_t_agua"
    icon: mdi:delta
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      if (isnan(id(${devicename}_temperatura_impulsion_agua).state) ||
          isnan(id(${devicename}_temperatura_retorno_agua).state)) {
        return NAN;
      }

      float ida = id(${devicename}_temperatura_impulsion_agua).state;
      float retorno = id(${devicename}_temperatura_retorno_agua).state;

      // Delta real con signo:
      // Calor: positivo si ida > retorno.
      // Frío: negativo si ida < retorno.
      return ida - retorno;

  - platform: template
    name: "Potencia térmica calculada"
    id: "${devicename}_potencia_termica_calculada"
    icon: mdi:calculator
    unit_of_measurement: "kW"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      if (isnan(id(${devicename}_caudal_agua).state) ||
          isnan(id(${devicename}_temperatura_impulsion_agua).state) ||
          isnan(id(${devicename}_temperatura_retorno_agua).state)) {
        return NAN;
      }

      float flow = id(${devicename}_caudal_agua).state;
      float ida = id(${devicename}_temperatura_impulsion_agua).state;
      float retorno = id(${devicename}_temperatura_retorno_agua).state;
      float delta = 0.0;

      if (flow <= 0.02) {
        return 0.0;
      }

      // En calefacción la ida debe ser mayor que el retorno.
      if (id(${devicename}_modo_actual_leido).state == "Calor") {
        delta = ida - retorno;
      }
      // En refrigeración la ida debe ser menor que el retorno.
      else if (id(${devicename}_modo_actual_leido).state == "Frío") {
        delta = retorno - ida;
      }
      // En ACS también consideramos potencia positiva si ida > retorno.
      else if (id(${devicename}_modo_actual_leido).state == "Calentando ACS") {
        delta = ida - retorno;
      }
      // Si está apagada/en espera, no calculamos potencia.
      else {
        return 0.0;
      }

      if (delta <= 0.1) {
        return 0.0;
      }

      return 1.163 * flow * delta;

  - platform: template
    name: "COP instantáneo"
    id: "${devicename}_cop_instantaneo"
    icon: mdi:speedometer
    unit_of_measurement: "COP"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Preferimos la potencia del módulo hidráulico si viene informada,
      // porque en frío el registro ya está dando valores coherentes.
      float p_termica_modulo = id(${devicename}_potencia_termica_modulo_hidraulico).state;
      float p_termica_calc = id(${devicename}_potencia_termica_calculada).state;
      float p_electrica = id(${devicename}_potencia_electrica_instantanea).state;

      float p_termica = p_termica_calc;

      if (!isnan(p_termica_modulo) && p_termica_modulo > 0.05) {
        p_termica = p_termica_modulo;
      }

      if (isnan(p_termica) || isnan(p_electrica) || p_termica <= 0.05 || p_electrica <= 0.05) {
        return NAN;
      }

      return p_termica / p_electrica;

  - platform: template
    name: "COP acumulado"
    id: "${devicename}_cop_acumulado"
    icon: mdi:chart-line
    unit_of_measurement: "COP"
    accuracy_decimals: 2
    update_interval: 30s
    lambda: |-
      float consumo = id(${devicename}_energia_electrica_consumida).state;
      float producida = id(${devicename}_energia_termica_producida).state;

      if (isnan(consumo) || isnan(producida) || consumo <= 0) {
        return NAN;
      }

      return producida / consumo;
