# ==================================================
# 10_MODBUS
# ==================================================
# Comunicación RS485.
#
# ESP32 GPIO17 TX2 -> DI / RXD módulo RS485
# ESP32 GPIO16 RX2 -> RO / TXD módulo RS485
# ESP32 GPIO4      -> DE y /RE unidos
# ESP32 GND        -> GND
#
# SP485 / MAX3485:
# A -> H1/H2
# B -> H2/H1
# E -> GND/referencia si hace falta

uart:
  id: mod_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  stop_bits: 1
  parity: NONE

modbus:
  id: heatpump_modbus
  flow_control_pin: GPIO4
  send_wait_time: 200ms

modbus_controller:
  - id: "${devicename}"
    address: 0x1
    modbus_id: heatpump_modbus
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms
