            );
          ${devicename}->queue_command(cmd);
    on_turn_off:
      - lambda: |-
          uint16_t new_value = id(reg_5_funciones) & ~0x40;
          id(reg_5_funciones) = new_value;
          auto cmd =
            esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
              ${devicename}, 0x5, new_value
            );
          ${devicename}->queue_command(cmd);

  # Nivel de modo silencioso.
  # El mapa lo marca como registro 0x05 bit 7.
  # Es binario: nivel normal/bajo o nivel alto, según cómo lo muestre la máquina.
  - platform: template
    name: "Nivel modo silencioso alto"
    id: "${devicename}_nivel_modo_silencioso_alto"
    icon: mdi:volume-low
    entity_category: config
    restore_mode: DISABLED
    optimistic: true
