    on_turn_on:
      - lambda: |-
          uint16_t new_value = id(reg_5_funciones) | 0x80;
          id(reg_5_funciones) = new_value;
          auto cmd =
            esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
              ${devicename}, 0x5, new_value
            );
          ${devicename}->queue_command(cmd);
    on_turn_off:
      - lambda: |-
          uint16_t new_value = id(reg_5_funciones) & ~0x80;
          id(reg_5_funciones) = new_value;
          auto cmd =
            esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
              ${devicename}, 0x5, new_value
            );
          ${devicename}->queue_command(cmd);

  - platform: template
    name: "Modo ECO"
    id: "${devicename}_modo_eco"
    icon: mdi:leaf
    entity_category: config
    restore_mode: DISABLED
    optimistic: true
    lambda: |-
      return (id(reg_5_funciones) & 0x400) == 0x400;
    on_turn_on:
      - lambda: |-
