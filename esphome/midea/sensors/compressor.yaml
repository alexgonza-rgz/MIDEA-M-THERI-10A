# ==================================================
# 62_COMPRESSOR
# ==================================================

sensor:
  - platform: modbus_controller
    modbus_controller_id: "${devicename}"
    name: "Frecuencia compresor"
    id: "${devicename}_frecuencia_compresor"
    icon: mdi:sine-wave
    register_type: holding
    address: 0x64
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: "${devicename}"
    name: "Frecuencia objetivo compresor"
    id: "${devicename}_frecuencia_objetivo_compresor"
    icon: mdi:sine-wave
    register_type: holding
    address: 0x84
    value_type: U_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: "${devicename}"
    name: "Velocidad ventilador exterior"
    id: "${devicename}_velocidad_ventilador"
    icon: mdi:fan
    register_type: holding
    address: 0x66
    value_type: U_WORD
    unit_of_measurement: "rpm"
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: "${devicename}"
    name: "Intensidad unidad exterior"
    id: "${devicename}_intensidad_exterior"
    icon: mdi:current-ac
    register_type: holding
    address: 0x76
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: "${devicename}"
    name: "Tensión unidad exterior"
    id: "${devicename}_tension_exterior"
    icon: mdi:flash
    register_type: holding
    address: 0x77
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: "${devicename}"
    name: "Horas compresor"
    id: "${devicename}_horas_compresor"
    icon: mdi:timer-outline
    register_type: holding
    address: 0x7A
    value_type: U_WORD
    unit_of_measurement: "h"
    state_class: total_increasing
