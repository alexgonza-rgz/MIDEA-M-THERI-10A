# ==================================================
# 00_BASE
# ==================================================
# Base ESPHome para Midea M-Theri.
# Aquí solo va la configuración general del ESP32.

globals:
  - id: reg_0_potencias
    type: uint16_t
    restore_value: no
    initial_value: '0'

  - id: reg_5_funciones
    type: uint16_t
    restore_value: no
    initial_value: '0'

  - id: reg_2_consigna_agua
    type: uint16_t
    restore_value: no
    initial_value: '0'

  - id: reg_272_modos_instalacion
    type: uint16_t
    restore_value: no
    initial_value: '0'

esphome:
  name: "${devicename}"
  comment: "${description}"
  friendly_name: "${description}"
  project:
    name: "alex.midea_mtheri_integracion"
    version: "2.0.0"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0

api:

ota:
  platform: esphome

web_server:
  port: 80
  version: 3

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "Aerotermia-Setup"
    password: "heatpump"

captive_portal:

button:
  - platform: restart
    name: "Reiniciar ESP aerotermia"
